services:
  music-advisor:
    build:
      context: .
      dockerfile: Dockerfile
    image: music-advisor:local
    container_name: music-advisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MA_BASE_URL: http://localhost:8080
      MA_ADDRESS: ":8080"
      MA_DATABASE_PATH: /data/music-advisor.db
      MA_LOG_LEVEL: info
      # Dev-only placeholders — replace in prod / .env
      # Dev placeholders — override in .env / prod. Each value must be exactly
      # 32 bytes (raw) or 64 hex chars.
      MA_SESSION_SECRET: ${MA_SESSION_SECRET:-01234567890123456789012345678901}
      MA_SECRET_KEY: ${MA_SECRET_KEY:-abcdefghijklmnopqrstuvwxyz012345}
      MA_SPOTIFY_CLIENT_ID: ${MA_SPOTIFY_CLIENT_ID:-}
      MA_SPOTIFY_CLIENT_SECRET: ${MA_SPOTIFY_CLIENT_SECRET:-}
      MA_USER_AGENT_CONTACT: ${MA_USER_AGENT_CONTACT:-you@example.com}
    volumes:
      - ma-data:/data
    healthcheck:
      test: ["CMD", "/app/music-advisor", "--healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  ma-data:
